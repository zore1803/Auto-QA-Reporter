kind = "web"
previewPath = "/"
title = "Autonomous QA Inspector"
version = "1.0.0"
id = "artifacts/qa-inspector"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18700

[services.development]
run = "pnpm --filter @workspace/qa-inspector run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/qa-inspector", "run", "build" ]
publicDir = "artifacts/qa-inspector/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18700"
BASE_PATH = "/"
